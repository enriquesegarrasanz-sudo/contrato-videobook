<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Contratos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════ */
    :root {
      --bg:          #F7F5F0;
      --surface:     #FFFFFF;
      --surface2:    #FAFAF7;
      --primary:     #111111;
      --secondary:   #4A4A4A;
      --tertiary:    #888888;
      --border:      #E3DDD5;
      --border2:     #EDE9E3;

      --gold:        #C4943A;
      --gold-light:  #FDF3E3;
      --gold-border: rgba(196,148,58,0.25);
      --gold-dark:   #8B6520;

      --blue:        #3B62CA;
      --blue-light:  #EEF2FF;

      --success:     #1A7A4A;
      --danger:      #C0362A;

      --shadow-xs:  0 1px 2px rgba(0,0,0,0.05);
      --shadow-sm:  0 1px 4px rgba(0,0,0,0.06), 0 2px 12px rgba(0,0,0,0.04);
      --shadow-md:  0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
      --shadow-lg:  0 12px 40px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.06);
      --shadow-xl:  0 24px 64px rgba(0,0,0,0.16);

      --r:    10px;
      --r-sm: 6px;
      --r-lg: 14px;
    }

    /* ═══════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--primary);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* ═══════════════════════════════════════
       HEADER
    ═══════════════════════════════════════ */
    .app-header {
      background: var(--primary);
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 200;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 19px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 9px;
      cursor: pointer;
      text-decoration: none;
    }
    .logo-diamond {
      color: var(--gold);
      font-size: 14px;
    }
    .header-right { display: flex; gap: 10px; align-items: center; }

    /* ═══════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════ */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: var(--r-sm);
      font-size: 13.5px;
      font-weight: 500;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      transition: background 0.15s, transform 0.12s, box-shadow 0.15s, opacity 0.15s;
      text-decoration: none;
      white-space: nowrap;
      line-height: 1;
    }
    .btn:active { transform: scale(0.97); }

    .btn-gold {
      background: var(--gold);
      color: #fff;
    }
    .btn-gold:hover { background: #B8832A; box-shadow: 0 4px 14px rgba(196,148,58,0.35); }

    .btn-dark {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-dark:hover { background: rgba(255,255,255,0.18); }

    .btn-outline {
      background: transparent;
      color: var(--primary);
      border: 1.5px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--primary); background: var(--surface2); }

    .btn-ghost {
      background: transparent;
      color: var(--secondary);
      border: none;
      padding: 7px 10px;
    }
    .btn-ghost:hover { background: var(--bg); color: var(--primary); }

    .btn-danger-ghost {
      background: transparent;
      color: var(--danger);
      border: none;
      padding: 7px 10px;
      font-size: 13px;
    }
    .btn-danger-ghost:hover { background: rgba(192,54,42,0.06); border-radius: var(--r-sm); }

    .btn-sm { padding: 7px 13px; font-size: 13px; }
    .btn-lg { padding: 12px 22px; font-size: 14.5px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

    /* ═══════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════ */
    .page { max-width: 1080px; margin: 0 auto; padding: 44px 28px; }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 5px;
    }
    .page-sub {
      font-size: 14.5px;
      color: var(--secondary);
      margin-bottom: 36px;
    }

    /* ═══════════════════════════════════════
       TEMPLATE GRID
    ═══════════════════════════════════════ */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    .tpl-card {
      background: var(--surface);
      border-radius: var(--r-lg);
      border: 1.5px solid var(--border2);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      display: flex;
      flex-direction: column;
    }
    .tpl-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-md);
      border-color: var(--border);
    }

    .card-stripe { height: 5px; }

    .card-body { padding: 22px 22px 16px; flex: 1; }

    .card-icon {
      width: 46px; height: 46px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      margin-bottom: 14px;
      background: var(--gold-light);
    }

    .card-name {
      font-size: 16.5px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 5px;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 13.5px;
      color: var(--secondary);
      line-height: 1.55;
      margin-bottom: 12px;
    }
    .card-footer {
      padding: 13px 22px;
      border-top: 1px solid var(--border2);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-badge {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      border-radius: 20px;
    }
    .badge-base { background: var(--gold-light); color: var(--gold-dark); }
    .badge-custom { background: var(--blue-light); color: var(--blue); }

    .card-actions { display: flex; gap: 8px; }

    /* New template card */
    .tpl-card-new {
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--r-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 220px;
      color: var(--tertiary);
      text-align: center;
    }
    .tpl-card-new:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: var(--gold-light);
    }
    .tpl-card-new svg { margin-bottom: 12px; transition: transform 0.2s; }
    .tpl-card-new:hover svg { transform: scale(1.1); }
    .tpl-card-new .new-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .tpl-card-new .new-sub { font-size: 13px; opacity: 0.75; }

    /* ═══════════════════════════════════════
       FILL VIEW
    ═══════════════════════════════════════ */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13.5px;
      color: var(--secondary);
      cursor: pointer;
      margin-bottom: 28px;
      padding: 5px 0;
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--primary); }

    .fill-layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 24px;
      align-items: start;
    }
    @media (max-width: 860px) { .fill-layout { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border-radius: var(--r-lg);
      border: 1.5px solid var(--border2);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .panel-head {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--border2);
    }
    .panel-title { font-size: 15px; font-weight: 600; margin-bottom: 2px; }
    .panel-sub { font-size: 12.5px; color: var(--tertiary); }
    .panel-body { padding: 20px 22px; }
    .panel-foot {
      padding: 16px 22px;
      border-top: 1px solid var(--border2);
      background: var(--surface2);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Forms */
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 12.5px;
      font-weight: 600;
      color: var(--secondary);
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .form-label .req { color: var(--gold); }
    .form-input, .form-textarea, .form-select {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      color: var(--primary);
      background: var(--surface);
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(196,148,58,0.14);
    }
    .form-input::placeholder, .form-textarea::placeholder { color: var(--tertiary); }
    .form-textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

    .field-group-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--tertiary);
      margin: 22px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border2);
    }

    /* Preview wrapper */
    .preview-wrap {
      background: var(--surface);
      border-radius: var(--r-lg);
      border: 1.5px solid var(--border2);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      position: sticky;
      top: 76px;
    }
    .preview-bar {
      padding: 12px 18px;
      border-bottom: 1px solid var(--border2);
      background: var(--surface2);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .preview-bar-label { font-size: 12.5px; font-weight: 600; color: var(--secondary); letter-spacing: 0.03em; }
    .preview-bar-hint { font-size: 12px; color: var(--tertiary); }
    .preview-scroll {
      padding: 28px 28px;
      max-height: calc(100vh - 180px);
      overflow-y: auto;
    }
    .preview-scroll::-webkit-scrollbar { width: 5px; }
    .preview-scroll::-webkit-scrollbar-track { background: transparent; }
    .preview-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    /* ═══════════════════════════════════════
       CONTRACT DOCUMENT
    ═══════════════════════════════════════ */
    .contract-doc {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 15.5px;
      line-height: 1.75;
      color: #1A1A1A;
    }
    .contract-doc h1 {
      font-family: 'EB Garamond', serif;
      font-size: 21px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-align: center;
      text-transform: uppercase;
      color: #111;
      margin-bottom: 7px;
    }
    .contract-doc .doc-subtitle {
      font-size: 15px;
      text-align: center;
      color: #555;
      font-style: italic;
      margin-bottom: 5px;
    }
    .contract-doc .doc-location {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      text-align: center;
      color: #888;
      letter-spacing: 0.04em;
      margin-bottom: 28px;
      padding-bottom: 22px;
      border-bottom: 1px solid #DDD6C4;
    }

    .doc-section { margin-bottom: 24px; }
    .doc-section-title {
      font-family: 'Inter', sans-serif;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #EAE0CA;
    }
    .doc-section p { margin-bottom: 9px; }
    .doc-section p:last-child { margin-bottom: 0; }
    .doc-section ul { list-style: none; margin: 8px 0; }
    .doc-section ul li {
      padding: 6px 0 6px 18px;
      position: relative;
      font-size: 15px;
      border-bottom: 1px solid #F2EDE0;
    }
    .doc-section ul li:last-child { border-bottom: none; }
    .doc-section ul li::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--gold);
      font-weight: 600;
    }

    .parties-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 10px;
    }
    .party-box {
      background: #FAFAF5;
      border: 1px solid #EAE0CA;
      border-radius: 6px;
      padding: 14px 16px;
    }
    .party-label-role {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 8px;
    }
    .party-box p { font-size: 14px; margin-bottom: 3px; }
    .party-field-label {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #AAAAAA;
      margin-top: 7px !important;
    }

    .price-tbl {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
      font-size: 14px;
    }
    .price-tbl tr td {
      padding: 9px 11px;
      border-bottom: 1px solid #EAE0CA;
      vertical-align: middle;
    }
    .price-tbl tr:first-child td { border-top: 1px solid #EAE0CA; background: #FAFAF5; font-weight: 600; }
    .price-tbl td:last-child {
      text-align: right;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .consent-block { margin: 14px 0; }
    .consent-row {
      display: flex;
      gap: 11px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid #F2EDE0;
      font-size: 14px;
    }
    .consent-row:last-child { border-bottom: none; }
    .consent-box { font-size: 17px; color: var(--gold); flex-shrink: 0; line-height: 1.5; }

    /* Pack selector */
    .pack-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .pack-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 14px 8px;
      border: 2px solid var(--border);
      border-radius: var(--r);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .pack-option:hover { border-color: var(--gold-border); background: var(--gold-light); }
    .pack-option.pack-active {
      border-color: var(--gold);
      background: var(--gold-light);
      box-shadow: 0 0 0 1px var(--gold);
    }
    .pack-name { font-size: 13px; font-weight: 600; color: var(--primary); }
    .pack-price { font-size: 18px; font-weight: 700; color: var(--gold-dark); font-family: 'EB Garamond', serif; }

    .sig-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin: 28px 0 16px;
    }
    .sig-block .sig-role {
      font-family: 'Inter', sans-serif;
      font-size: 9.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--gold);
      margin-bottom: 34px;
    }
    .sig-line { border-bottom: 1px solid #1A1A1A; margin-bottom: 6px; }
    .sig-name { font-size: 13px; color: #555; margin-bottom: 2px; }
    .sig-sublabel { font-family: 'Inter', sans-serif; font-size: 9px; color: #AAA; text-transform: uppercase; letter-spacing: 0.07em; }
    .sig-date { font-size: 13px; color: #666; margin-top: 12px; }

    /* ═══════════════════════════════════════
       MODAL
    ═══════════════════════════════════════ */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-xl);
      width: 100%;
      max-width: 460px;
      transform: scale(0.94) translateY(12px);
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }

    .modal-head { padding: 28px 28px 0; text-align: center; }
    .modal-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, #2A7A4A, #1A5A35);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 14px;
      font-size: 26px;
      box-shadow: 0 8px 24px rgba(42,122,74,0.25);
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 6px;
    }
    .modal-sub { font-size: 13.5px; color: var(--secondary); line-height: 1.5; }
    .modal-body { padding: 22px 28px; }
    .modal-foot {
      padding: 16px 28px 24px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .url-box {
      background: var(--gold-light);
      border: 1.5px solid var(--gold-border);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      margin-bottom: 10px;
    }
    .url-box-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--gold-dark);
      margin-bottom: 8px;
    }
    .url-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .url-text {
      flex: 1;
      font-size: 12px;
      font-family: 'Inter', monospace;
      color: var(--secondary);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      background: #fff;
      border: 1px solid rgba(196,148,58,0.25);
      border-radius: 4px;
      padding: 7px 10px;
    }
    .url-hint {
      font-size: 12px;
      color: var(--tertiary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Copy btn state */
    .btn-copied {
      background: var(--success) !important;
    }

    /* ═══════════════════════════════════════
       WIZARD
    ═══════════════════════════════════════ */
    .wizard-wrap { max-width: 680px; margin: 0 auto; }

    .wizard-progress {
      display: flex;
      align-items: center;
      margin-bottom: 32px;
      gap: 0;
    }
    .wiz-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      position: relative;
    }
    .wiz-step:not(:last-child)::after {
      content: '';
      position: absolute;
      top: 16px;
      left: 50%;
      width: 100%;
      height: 2px;
      background: var(--border);
      z-index: 0;
      transition: background 0.3s;
    }
    .wiz-step.done:not(:last-child)::after { background: var(--gold); }

    .wiz-dot {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--tertiary);
      position: relative;
      z-index: 1;
      transition: all 0.2s;
    }
    .wiz-step.active .wiz-dot {
      border-color: var(--gold);
      background: var(--gold);
      color: #fff;
      box-shadow: 0 0 0 5px rgba(196,148,58,0.18);
    }
    .wiz-step.done .wiz-dot {
      border-color: var(--gold);
      background: var(--gold-light);
      color: var(--gold-dark);
    }
    .wiz-label {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--tertiary);
      margin-top: 6px;
      text-align: center;
    }
    .wiz-step.active .wiz-label { color: var(--gold-dark); font-weight: 600; }
    .wiz-step.done .wiz-label { color: var(--secondary); }

    .wiz-card {
      background: var(--surface);
      border: 1.5px solid var(--border2);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .wiz-head { padding: 26px 28px 18px; border-bottom: 1px solid var(--border2); }

    .wiz-body { padding: 26px 28px; }
    .wiz-foot {
      padding: 16px 28px;
      border-top: 1px solid var(--border2);
      background: var(--surface2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 22px;
    }
    .cat-card {
      border: 2px solid var(--border);
      border-radius: var(--r);
      padding: 16px 10px 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cat-card:hover { border-color: var(--gold); background: var(--gold-light); }
    .cat-card.sel { border-color: var(--gold); background: var(--gold-light); }
    .cat-card .cat-em { font-size: 28px; display: block; margin-bottom: 6px; }
    .cat-card .cat-name { font-size: 12.5px; font-weight: 500; color: var(--secondary); }
    .cat-card.sel .cat-name { color: var(--gold-dark); font-weight: 600; }

    /* Items in wizard */
    .item-list { display: flex; flex-direction: column; gap: 10px; }
    .item-row {
      background: var(--surface2);
      border: 1.5px solid var(--border2);
      border-radius: var(--r-sm);
      padding: 12px 12px;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .item-inputs { flex: 1; display: flex; flex-direction: column; gap: 7px; }
    .item-remove { flex-shrink: 0; padding-top: 2px; }

    /* Clause toggles */
    .clause-list { display: flex; flex-direction: column; gap: 8px; }
    .clause-row {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      padding: 14px 16px;
      border: 1.5px solid var(--border2);
      border-radius: var(--r);
      cursor: pointer;
      transition: all 0.15s;
    }
    .clause-row:hover { background: var(--surface2); }
    .clause-row.sel { border-color: var(--gold); background: var(--gold-light); }
    .clause-check {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 2px;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px;
      transition: all 0.15s;
    }
    .clause-row.sel .clause-check { background: var(--gold); border-color: var(--gold); color: #fff; }
    .clause-info-t { font-size: 14px; font-weight: 500; margin-bottom: 2px; }
    .clause-info-d { font-size: 12.5px; color: var(--secondary); }

    /* ═══════════════════════════════════════
       SHARED CONTRACT FULL PAGE
    ═══════════════════════════════════════ */
    .contract-full-page {
      min-height: 100vh;
      background: #EFEDE8;
      padding: 40px 20px 60px;
    }
    .contract-sheet {
      background: #fff;
      max-width: 760px;
      margin: 0 auto;
      padding: 64px 72px;
      box-shadow: var(--shadow-xl);
      border-radius: 3px;
    }
    .contract-sheet-actions {
      max-width: 760px;
      margin: 20px auto 0;
      display: flex;
      justify-content: center;
      gap: 12px;
    }
    .contract-sheet-actions .btn {
      background: var(--primary);
      color: #fff;
      font-size: 14px;
    }
    .contract-sheet-actions .btn:hover { background: #333; }
    .contract-sheet-actions .btn-o {
      background: transparent;
      color: var(--secondary);
      border: 1.5px solid rgba(0,0,0,0.2);
    }
    .contract-sheet-actions .btn-o:hover { background: rgba(0,0,0,0.06); }

    /* ═══════════════════════════════════════
       TOAST
    ═══════════════════════════════════════ */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--primary);
      color: #fff;
      padding: 11px 20px;
      border-radius: 30px;
      font-size: 13.5px;
      font-weight: 500;
      z-index: 9999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.3s;
      pointer-events: none;
      white-space: nowrap;
      box-shadow: var(--shadow-lg);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.ok { background: var(--success); }

    /* ═══════════════════════════════════════
       PRINT
    ═══════════════════════════════════════ */
    @media print {
      .app-header, .contract-sheet-actions, .preview-bar,
      .fill-layout .panel, .back-btn, .modal-overlay { display: none !important; }
      body { background: #fff; }
      .contract-full-page { padding: 0; background: #fff; }
      .contract-sheet { box-shadow: none; padding: 20px 32px; max-width: 100%; border-radius: 0; }
    }

    /* ═══════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════ */
    @media (max-width: 600px) {
      .page { padding: 28px 16px; }
      .parties-grid, .sig-grid { grid-template-columns: 1fr; }
      .contract-sheet { padding: 32px 24px; }
      .cat-grid { grid-template-columns: repeat(2, 1fr); }
      .wiz-label { display: none; }
    }

    /* ═══════════════════════════════════════
       UTILS
    ═══════════════════════════════════════ */
    .divider { height: 1px; background: var(--border2); margin: 20px 0; }
    .text-gold { color: var(--gold); }
    .text-muted { color: var(--tertiary); font-size: 13px; }
  </style>
</head>

function fmtDate(s) {
  if (!s) return blank('fecha');
  const d = new Date(s + 'T12:00:00');

      return `<p>${line}</p>`;
    });
    let html = '';

    for (const p of paragraphs) {

/* ══════════════════════════════════════════════
   SHARING
══════════════════════════════════════════════ */
function makeUrl(tplId, vals) {
  const tpl = getTpl(tplId); if (!tpl) return null;
  let payload;
  if (tpl.isBuiltIn && tpl.hasPacks) {
    const resolved = getResolvedSpec(tpl, vals);
    const cleanVals = { ...vals }; delete cleanVals._pack;
    payload = JSON.stringify({ spec: resolved, name: tpl.name, v: cleanVals });
  } else if (tpl.isBuiltIn) {
    payload = JSON.stringify({ t: tplId, v: vals });
  } else {
    payload = JSON.stringify({ spec: tpl.spec, name: tpl.name, v: vals });
  }
  const enc = btoa(encodeURIComponent(payload));
  return window.location.href.split('?')[0] + '?c=' + enc;
}

function decodeUrl(c) {
  try {
    const d = JSON.parse(decodeURIComponent(atob(c)));
    if (d.t) {
      const tpl = BUILT_IN[d.t]; if (!tpl) return null;
      return { spec: tpl.spec, name: tpl.name, values: d.v || {} };
    }
    return { spec: d.spec, name: d.name, values: d.v || {} };
  } catch { return null; }
}

}

function navigate(view, opts) {
  S.view = view;
  if (opts) Object.assign(S, opts);
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function render() {
  const root = document.getElementById('root');
  const hdr  = document.getElementById('headerRight');

  const params = new URLSearchParams(window.location.search);
  const c = params.get('c');
  if (c && S.view === 'home') {
    const data = decodeUrl(c);
    if (data) { S.view = 'contract'; S.contractData = data; }
  }

  switch (S.view) {
    case 'home':     renderHome(root, hdr); break;
    case 'fill':     renderFill(root, hdr); break;
    case 'create':   renderCreate(root, hdr); break;
    case 'contract': renderContractPage(root, hdr); break;
  }
}

    const dotContent = num < step ? '✓' : num;
    return `<div class="${cls}">
      <div class="wiz-dot">${dotContent}</div>
      <div class="wiz-label">${label}</div>
    </div>`;
  }).join('');

  const titles = ['Información básica','Servicios incluidos','Precios y condiciones de pago','Cláusulas legales'];
  const subs   = [
    'Define el tipo y nombre de tu plantilla de contrato',
    'Añade los servicios que ofreces en este contrato',
    'Establece el precio y la forma de pago',
    'Selecciona las cláusulas legales que quieres incluir',
  ];

  let body = '';

  if (step === 1) {
    const catCards = CATS.map(c => `
      <div class="cat-card${d.category===c.id?' sel':''}" onclick="wizCat('${c.id}','${c.icon}')">
        <span class="cat-em">${c.icon}</span>
        <span class="cat-name">${c.name}</span>
      </div>`).join('');
    body = `
      <div class="form-group">
        <label class="form-label">Categoría <span class="req">*</span></label>
        <div class="cat-grid">${catCards}</div>
      </div>
      <div class="form-group">
        <label class="form-label">Nombre de la plantilla <span class="req">*</span></label>
        <input class="form-input" value="${d.name}" placeholder="Ej: Contrato Fotografía de Moda" oninput="wizSet('name',this.value)">
      </div>
      <div class="form-group">
        <label class="form-label">Subtítulo del contrato</label>
        <input class="form-input" value="${d.subtitle}" placeholder="Ej: Sesión de fotografía profesional" oninput="wizSet('subtitle',this.value)">
      </div>
      <div class="form-group">
        <label class="form-label">Descripción del servicio</label>
        <textarea class="form-textarea" placeholder="El prestador se compromete a..." oninput="wizSet('objectText',this.value)">${d.objectText}</textarea>
      </div>`;
  }

  if (step === 2) {
    const items = d.services.map((s, i) => `
      <div class="item-row">
        <div class="item-inputs">
          <input class="form-input" placeholder="Nombre del servicio (ej: Sesión fotográfica)" value="${s.name}" oninput="wizSvc(${i},'name',this.value)">
          <input class="form-input" placeholder="Descripción breve" value="${s.desc||''}" oninput="wizSvc(${i},'desc',this.value)">
        </div>
        ${d.services.length > 1 ? `<button class="btn btn-danger-ghost item-remove" onclick="wizRmSvc(${i})">✕</button>` : ''}
      </div>`).join('');
    body = `
      <div class="item-list">${items}</div>
      <button class="btn btn-outline" style="margin-top:14px;width:100%" onclick="wizAddSvc()">
        + Añadir servicio
      </button>`;
  }

  if (step === 3) {
    const items = d.prices.map((p, i) => `
      <div class="item-row">
        <div class="item-inputs">
          <input class="form-input" placeholder="Concepto (ej: Servicio base)" value="${p.concept}" oninput="wizPrc(${i},'concept',this.value)">
          <input class="form-input" placeholder="Importe (ej: 300,00 €)" value="${p.amount}" oninput="wizPrc(${i},'amount',this.value)">
        </div>
        ${d.prices.length > 1 ? `<button class="btn btn-danger-ghost item-remove" onclick="wizRmPrc(${i})">✕</button>` : ''}
      </div>`).join('');
    body = `
      <div class="item-list">${items}</div>
      <button class="btn btn-outline" style="margin-top:14px;width:100%" onclick="wizAddPrc()">
        + Añadir concepto
      </button>
      <div style="margin-top:22px">
        <label class="form-label">Condiciones de pago</label>
        <textarea class="form-textarea" placeholder="Describe los plazos y forma de pago..." oninput="wizSet('paymentTerms',this.value)">${d.paymentTerms}</textarea>
      </div>`;
  }

  if (step === 4) {
    const rows = CLAUSE_DEFS.map(c => `
      <div class="clause-row${d.clauses[c.id]?' sel':''}" onclick="wizToggle('${c.id}')">
        <div class="clause-check">${d.clauses[c.id]?'✓':''}</div>
        <div>
          <div class="clause-info-t">${c.t}</div>
          <div class="clause-info-d">${c.d}</div>
        </div>
      </div>`).join('');
    body = `<div class="clause-list">${rows}</div>`;
  }

  root.innerHTML = `
    <div class="page">
      <button class="back-btn" onclick="navigate('home')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Cancelar
      </button>
      <div class="page-title">Nueva Plantilla</div>
      <p class="page-sub">Crea un modelo de contrato reutilizable en 4 pasos.</p>

      <div class="wizard-wrap">
        <div class="wizard-progress">${progress}</div>
        <div class="wiz-card">
          <div class="wiz-head">
            <div class="wiz-title">${titles[step-1]}</div>
            <div class="wiz-sub">${subs[step-1]}</div>
          </div>
          <div class="wiz-body">${body}</div>
          <div class="wiz-foot">
            <button class="btn btn-outline" ${step===1?'disabled':''} onclick="wizPrev()">← Anterior</button>
            ${step < 4
              ? `<button class="btn btn-gold" onclick="wizNext()">Siguiente →</button>`
              : `<button class="btn btn-gold btn-lg" onclick="wizSave()">Guardar plantilla →</button>`}
          </div>
        </div>
      </div>
    </div>`;
}

function wizSet(k,v) { S.wiz.d[k] = v; }
function wizCat(id, icon) { S.wiz.d.category = id; S.wiz.d.icon = icon; renderCreate(document.getElementById('root'), document.getElementById('headerRight')); }
function wizSvc(i,k,v) { S.wiz.d.services[i][k] = v; }
function wizAddSvc() { S.wiz.d.services.push({name:'',desc:''}); renderCreate(document.getElementById('root'),document.getElementById('headerRight')); }
function wizRmSvc(i) { S.wiz.d.services.splice(i,1); renderCreate(document.getElementById('root'),document.getElementById('headerRight')); }
function wizPrc(i,k,v) { S.wiz.d.prices[i][k] = v; }
function wizAddPrc() { S.wiz.d.prices.push({concept:'',amount:''}); renderCreate(document.getElementById('root'),document.getElementById('headerRight')); }
function wizRmPrc(i) { S.wiz.d.prices.splice(i,1); renderCreate(document.getElementById('root'),document.getElementById('headerRight')); }
function wizToggle(id) { S.wiz.d.clauses[id] = !S.wiz.d.clauses[id]; renderCreate(document.getElementById('root'),document.getElementById('headerRight')); }

function wizNext() {
  if (S.wiz.step === 1 && !S.wiz.d.name.trim()) { toast('Escribe el nombre de la plantilla'); return; }
  S.wiz.step++;
  renderCreate(document.getElementById('root'), document.getElementById('headerRight'));
}
function wizPrev() {
  if (S.wiz.step > 1) { S.wiz.step--; renderCreate(document.getElementById('root'),document.getElementById('headerRight')); }
}

function wizSave() {
  const d = S.wiz.d;
  if (!d.name.trim()) { toast('Escribe el nombre de la plantilla'); S.wiz.step = 1; renderCreate(document.getElementById('root'),document.getElementById('headerRight')); return; }

  const extraClauses = CLAUSE_DEFS
    .filter(c => d.clauses[c.id] && CLAUSE_TEXTS[c.id])
    .map(c => CLAUSE_TEXTS[c.id]);

  const catData = CATS.find(c => c.id === d.category) || CATS[5];
  const tpl = {
    id: 'custom_' + Date.now(),
    name: d.name,
    description: d.subtitle || 'Plantilla personalizada de contrato',
    category: catData.name,
    icon: d.icon || catData.icon,
    color: '#3B62CA',
    isBuiltIn: false,
    createdAt: new Date().toISOString().split('T')[0],
    spec: {
      mainTitle: 'CONTRATO DE PRESTACIÓN DE SERVICIOS',
      subtitle: d.subtitle || '',
      objectText: d.objectText || 'El prestador se compromete a prestar los servicios detallados a continuación.',
      services: d.services.filter(s => s.name.trim()),
      prices: d.prices.filter(p => p.concept.trim()),
      paymentTerms: d.paymentTerms,
      extraClauses,
      includeAIConsent: d.clauses.ai,
    }
  };

  saveCustom(tpl);
  toast(`Plantilla "${d.name}" guardada`, 'ok');
  navigate('home');
}

/* ══════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', () => {
  const params = new URLSearchParams(window.location.search);
  const c = params.get('c');
  if (c) {
    const data = decodeUrl(c);
    if (data) { S.view = 'contract'; S.contractData = data; }
  }
  render();
});
</script>
</body>
</html>
